  <title>อาจารย์ดำรงตำแหน่งระดับคณะ : ภาควิชาการพยาบาลสูติศาสตร์ - นรีเวชวิทยา คณะพยาบาลศาสตร์ มหาวิทยาลัยมหิดล</title>
  <link rel="stylesheet" href="style.css">
  <script src="../../components/layout.js" defer></script>
  <style type="text/css">
    /* New Grid Layout for Position Gallery */
    .position-gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 1040px;
      /* Matching the approximate original table width + padding */
      margin: 30px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .position-gallery img {
      width: 100%;
      height: auto;
      display: block;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      /* Subtle shadow for depth */
      border-radius: 8px;
      /* Soft corners */
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .position-gallery img:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    .gallery-title {
      font-family: 'Mitr', tahoma, sans-serif;
      font-size: 24px;
      color: #68108c;
      /* Purple theme color */
      text-align: center;
      margin-top: 40px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .position-gallery {
        grid-template-columns: 1fr;
        padding: 0 15px;
      }
    }
  </style>
  
</head>
